# ─── FORMULAS ────────────────────────────────────────────────────────────────
formulas:
  - name: player_effective_speed
    status: active
    source: design/gdd/movement-system.md
    referenced_by:
      - design/gdd/movement-system.md
    variables:
      - base_speed
      - min_speed
      - orb_count
      - speed_penalty_per_orb
    output_range: [60.0, 400.0]
    expression: "max(min_speed, base_speed - orb_count * speed_penalty_per_orb)"
    added: 2026-06-14
    revised: ""

  - name: owl_cone_detection
    status: active
    source: design/gdd/enemy-system.md
    referenced_by:
      - design/gdd/enemy-system.md
    variables:
      - owl_pos
      - player_pos
      - owl_dir
      - detection_radius
      - cone_angle
    output_range: [0, 1]
    expression: "distance(owl_pos, player_pos) <= detection_radius && angle_between(owl_dir, player_pos - owl_pos) <= cone_angle / 2"
    added: 2026-06-14
    revised: ""

  - name: world_saturation
    status: active
    source: design/gdd/soul-collection.md
    referenced_by:
      - design/gdd/soul-collection.md
    variables:
      - base_saturation
      - souls_delivered_total
      - souls_level_total
    output_range: [0.0, 1.0]
    expression: "base_saturation + (1.0 - base_saturation) * (souls_delivered_total / souls_level_total)"
    added: 2026-06-14
    revised: ""

